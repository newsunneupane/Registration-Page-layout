<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registrationcss.css">
    <title>Registration Page</title>
</head>
<body>
    <div class="container">
        <h2>Registration form</h2>
        <div class="form">
            <form>
                <div class="input names-row">
                    <input type="text" placeholder="First Name" class="name">
                    <input type="text" placeholder="Last Name" class="name">
                </div>
                <div class="input">
                    <input type="email" placeholder="Email" class="email">
                </div>
                <div class="input">
                    <input type="password" placeholder="Password" class="email">
                </div>
                <div class="input">
                    <input type="password" placeholder="Confirm Password" class="email">
                </div>
                <div class="input">
                    <input type="radio" class="radio" name="r1">
                    <lable style="margin-right: 30px;">Male</lable>
                    <input type="radio" class="radio" name="r1">
                    <lable>Female</lable>
                </div>
                <div class="input">
                    <select class="select">
                        <option value="">Select Country</option>
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="india">India</option>
                    </select>
                    <div class="arrow">
                    </div>
                <div class="input">
                    <input type="checkbox" class="checkbox" >
                    <lable>I agree to the terms and conditions</lable>
                </div>
                <div>
                    <button type="submit" class="button">Register</button>
                </div>

                </div>
            </form>
        </div>
    </div>
</body>
</html>
